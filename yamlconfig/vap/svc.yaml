apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx-unprivileged
  name: nginx-unprivileged
  namespace: psatestenforcerestricted
spec:
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: nginx-unprivileged2
status:
  loadBalancer: {}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: nginx-unprivileged
    env: prd
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  name: nginx-unprivileged-lb
  namespace: psatestenforcerestricted
spec:
  type: LoadBalancer
  ports:
  - port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: nginx-unprivileged2
status:
  loadBalancer: {}